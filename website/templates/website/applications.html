{% extends "website/base.html" %}
{% load static %}
{% block content %}
<script>
  document.body.dataset.managerOnly = 'true';
  document.body.style.visibility = 'hidden'; 
</script>
  <!-- PAGE CONTENT -->
  <div class="container-fluid px-4 py-4">

    <!-- Page header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="wt-greeting mb-1">Applications</h4>
        <p class="text-secondary small mb-0">Review and manage job applicants</p>
      </div>
      <!--
        Badge showing how many pending applications
        applications.js fills this number
      -->
      <span id="pending-count" class="wt-page-badge"></span>
    </div>

    <!--
      Application cards container
      applications.js renders one card per applicant here
    -->
    <div id="applications-list" class="d-flex flex-column gap-3"></div>

    <!--
      Empty state — shown when all applications are handled
      d-none by default, applications.js shows it when list is empty
    -->
    <div id="empty-state" class="d-none text-center py-5">
      <div class="wt-empty-icon mb-3">✓</div>
      <h6 class="text-white mb-1">All caught up</h6>
      <p class="text-secondary small mb-0">No pending applications at the moment.</p>
    </div>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src='{% static "js/applications.js" %}'></script>
{% endblock content %}
