{% extends "website/base.html" %}
{% load static %}
{% block content %}
<script>
  document.body.dataset.managerOnly = 'true';
  document.body.style.visibility = 'hidden'; 
</script>
  <div class="container-fluid px-4 py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="wt-greeting mb-1">Team Attendance</h4>
        <p class="text-secondary small mb-0">Monitor your team's attendance records</p>
      </div>
      <!--
        Export CSV button — nice to have from breakdown doc
        attendance-manager.js handles this click
      -->
      <button id="export-csv" class="btn wt-btn-export">
        ↓ Export CSV
      </button>
    </div>


    <!-- TODAY VIEW — who has and hasn't marked today -->
    <div class="row g-3 mb-4">

      <!-- Present today -->
      <div class="col-12 col-md-6">
        <div class="wt-card wt-today-card wt-today-present">
          <p class="wt-col-title mb-3">
            <span class="wt-dot-inline wt-dot-green"></span>
            Present Today
          </p>
          <div id="present-today-list" class="d-flex flex-wrap gap-2"></div>
        </div>
      </div>

      <!-- Absent today -->
      <div class="col-12 col-md-6">
        <div class="wt-card wt-today-card wt-today-absent">
          <p class="wt-col-title mb-3">
            <span class="wt-dot-inline wt-dot-red"></span>
            Not Marked Today
          </p>
          <div id="absent-today-list" class="d-flex flex-wrap gap-2"></div>
        </div>
      </div>

    </div>


    <!-- FILTERS -->
    <div class="wt-card p-0 overflow-hidden">

      <div class="wt-table-header px-4 py-3 d-flex flex-wrap justify-content-between align-items-center gap-3">

        <span class="text-white fw-semibold" style="font-size:14px;">Attendance Records</span>

        <div class="d-flex gap-3 flex-wrap align-items-center">

          <!-- Filter by employee name -->
          <select id="filter-employee" class="wt-select">
            <option value="all">All Employees</option>
            <!-- attendance-manager.js fills options -->
          </select>

          <!-- Filter by date -->
          <input type="date" id="filter-date" class="wt-input" style="width:160px; padding:6px 12px;"/>

          <!-- Clear filters -->
          <button id="clear-filters" class="btn wt-btn-ghost">Clear</button>

        </div>
      </div>

      <!-- Records table -->
      <div class="table-responsive">
        <table class="table wt-table mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Employee</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendance-tbody"></tbody>
        </table>
      </div>

      <!-- Empty state -->
      <div id="att-empty" class="d-none text-center py-5">
        <p class="text-secondary small mb-0">No records found for the selected filters.</p>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
{% endblock content %}
