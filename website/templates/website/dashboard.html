{% extends "website/base.html" %}
{% load static %}
{% block content %}
  <!-- ===================== PAGE CONTENT ===================== -->
  <div class="container-fluid px-4 py-4">

    <!-- Greeting — auth.js fills the name, dashboard.js fills the time -->
    <div class="mb-4">
      <h4 id="greeting" class="wt-greeting mb-1"></h4>
      <p id="today-date" class="text-secondary mb-0 small"></p>
    </div>

    <!-- Attendance button — hidden for manager by dashboard.js -->
    <div id="attend-section" class="mb-5">
      <button id="attendance-btn" class="btn wt-btn-attend">
        Mark Today's Attendance
      </button>
      <p id="attend-msg" class="mt-2 small"></p>
    </div>


    <!-- ===== EMPLOYEE VIEW — 3 task columns ===== -->
    <!-- dashboard.js hides this and shows manager-view if is_manager -->
    <div id="employee-view">
      <div class="row g-4">

        <!-- Pending -->
        <div class="col-12 col-md-4">
          <div class="wt-card h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="wt-col-title">Pending</span>
              <span id="count-pending" class="wt-badge wt-badge-pending">0</span>
            </div>
            <div id="list-pending" class="d-flex flex-column gap-2"></div>
          </div>
        </div>

        <!-- In Review -->
        <div class="col-12 col-md-4">
          <div class="wt-card h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="wt-col-title">In Review</span>
              <span id="count-review" class="wt-badge wt-badge-review">0</span>
            </div>
            <div id="list-review" class="d-flex flex-column gap-2"></div>
          </div>
        </div>

        <!-- Completed -->
        <div class="col-12 col-md-4">
          <div class="wt-card h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="wt-col-title">Completed</span>
              <span id="count-completed" class="wt-badge wt-badge-done">0</span>
            </div>
            <div id="list-completed" class="d-flex flex-column gap-2"></div>
          </div>
        </div>

      </div>
    </div>
    <!-- ===== END EMPLOYEE VIEW ===== -->


    <!-- ===== MANAGER VIEW — stat cards + absent list ===== -->
    <!-- d-none by default — dashboard.js shows this for managers -->
    <div id="manager-view" class="d-none">

      <div class="row g-4 mb-4">

        <div class="col-6 col-md-3">
          <div class="wt-card text-center">
            <p class="text-secondary small mb-1">Total Employees</p>
            <h3 id="stat-employees" class="wt-stat-number mb-0"></h3>
          </div>
        </div>

        <div class="col-6 col-md-3">
          <div class="wt-card text-center">
            <p class="text-secondary small mb-1">Present Today</p>
            <h3 id="stat-present" class="wt-stat-number mb-0"></h3>
          </div>
        </div>

        <div class="col-6 col-md-3">
          <div class="wt-card text-center">
            <p class="text-secondary small mb-1">Active Tasks</p>
            <h3 id="stat-tasks" class="wt-stat-number mb-0"></h3>
          </div>
        </div>

        <div class="col-6 col-md-3">
          <div class="wt-card text-center">
            <p class="text-secondary small mb-1">Applications</p>
            <h3 id="stat-app" class="wt-stat-number mb-0"></h3>
          </div>
        </div>

      </div>

      <!-- Who hasn't marked attendance today -->
      <div class="wt-card">
        <p class="wt-col-title mb-3">Not marked attendance today</p>
        <div id="absent-list" class="d-flex flex-wrap gap-2"></div>
      </div>

    </div>
    <!-- ===== END MANAGER VIEW ===== -->

  </div>
  <!-- ===================== END PAGE CONTENT ===================== -->


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!--
    SCRIPT ORDER MATTERS — load in this exact order:
    1. auth.js   — checks login, fills navbar, handles logout
    2. data.js   — mock data (tasks, stats, etc.)
    3. dashboard.js — fills the page content
  -->
    <script src='{% static "js/dashboard.js" %}'></script>
  

{% endblock content %}
