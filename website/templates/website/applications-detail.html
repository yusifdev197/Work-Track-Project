{% extends "website/base.html" %}
{% load static %}
{% block content %}
<script>
  document.body.dataset.managerOnly = 'true';
  document.body.style.visibility = 'hidden'; 
</script>
  <!-- PAGE CONTENT -->
  <div class="container-fluid px-4 py-4">

    <!-- Back button -->
    <div class="mb-4">
      <a href="applications.html" class="wt-back-link">← Back to Applications</a>
    </div>

    <!--
      Detail content — applications-detail.js fills everything inside here
      using the applicant id saved in localStorage
    -->
    <div id="detail-content">

      <div class="row g-4">

        <!-- LEFT COLUMN — main info -->
        <div class="col-12 col-lg-8">

          <!-- Name + status -->
          <div class="wt-card mb-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h4 id="detail-name" class="text-white fw-bold mb-1"></h4>
                <p id="detail-email" class="text-secondary small mb-0"></p>
              </div>
              <span class="wt-status-badge">Pending Review</span>
            </div>

            <!-- Skills -->
            <div class="mb-3">
              <p class="wt-label mb-2">Skills</p>
              <div id="detail-skills" class="d-flex flex-wrap gap-2"></div>
            </div>

            <!-- Applied date -->
            <p class="text-secondary small mb-0">
              Applied on <span id="detail-date" class="text-white"></span>
            </p>
          </div>

          <!-- About -->
          <div class="wt-card mb-4">
            <p class="wt-col-title mb-3">About</p>
            <p id="detail-about" class="text-secondary mb-0" style="line-height: 1.7;"></p>
          </div>

          <!-- Approve / Reject buttons -->
          <div class="d-flex gap-3">
            <button id="approve-btn" class="btn wt-btn-approve flex-grow-1">
              ✓ Approve Application
            </button>
            <button id="reject-btn" class="btn wt-btn-reject flex-grow-1">
              ✗ Reject Application
            </button>
          </div>

        </div>

        <!-- RIGHT COLUMN — contact + links -->
        <div class="col-12 col-lg-4">

          <!-- Contact info -->
          <div class="wt-card mb-4">
            <p class="wt-col-title mb-3">Contact</p>

            <div class="mb-3">
              <p class="wt-detail-label">Phone</p>
              <p id="detail-phone" class="text-white small mb-0"></p>
            </div>

            <div class="mb-3">
              <p class="wt-detail-label">Email</p>
              <p id="detail-email-2" class="text-white small mb-0"></p>
            </div>
          </div>

          <!-- Project links + CV -->
          <div class="wt-card">
            <p class="wt-col-title mb-3">Links & Documents</p>

            <div class="mb-3">
              <p class="wt-detail-label">Project Link</p>
              <!--
                id="detail-project-link" — JS sets the href and text
                target="_blank" opens in a new tab
                rel="noopener" is a security best practice with target="_blank"
              -->
              <a id="detail-project-link"
                 href="#"
                 target="_blank"
                 rel="noopener"
                 class="wt-link small">
              </a>
            </div>

            <div>
              <p class="wt-detail-label">CV / Resume</p>
              <!--
                CV download link
                In real app this would be a real file URL from the backend
                For now it shows the filename
              -->
              <a id="detail-cv"
                 href="#"
                 class="wt-link small">
              </a>
            </div>

          </div>

        </div>

      </div>

    </div>
    <!-- end detail-content -->

    <!--
      Action result message — shown after approve or reject
      Hidden by default, JS shows it with correct message + color
    -->
    <div id="action-result" class="d-none text-center py-5">
      <div id="action-icon" class="wt-empty-icon mb-3"></div>
      <h5 id="action-title" class="text-white mb-2"></h5>
      <p id="action-msg" class="text-secondary small mb-4"></p>
      <a href="{% url "applications" %}" class="btn wt-btn-primary px-4">
        Back to Applications
      </a>
    </div>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src='{% static "js/applications-detail.js" %}'></script>
{% endblock content %}
